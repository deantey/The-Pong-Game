<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <title>Neon Pong 2</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div id="phone">
    <div id="menu">
      <div class="panel">
        <h1>NEON PONG</h1>
        <div class="version">v2.0</div>
        <button data-mode="easy">1 Player — Easy</button>
        <button data-mode="medium">1 Player — Medium</button>
        <button data-mode="hard">1 Player — Hard</button>
        <button data-mode="two">2 Players</button>
      </div>
    </div>
    <canvas id="game"></canvas>
  </div>
  <script src="game.js"></script>
</body>
</html>
