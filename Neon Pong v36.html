<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,user-scalable=no,viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Neon Pong">
<meta name="mobile-web-app-capable" content="yes">
<title>Neon Pong</title>
<style>
html,body{margin:0;width:100%;height:100%;overflow:hidden;background:#02020b;font-family:Arial,Helvetica,sans-serif;touch-action:none}
body{display:flex;align-items:center;justify-content:center}
#phone{position:relative;width:min(100vw,430px);height:100vh;max-height:932px;background:#050510;overflow:hidden;box-shadow:0 0 35px #00ffff}
@media(orientation:landscape){#phone{height:100vh;width:min(56.25vh,430px)}}
canvas{width:100%;height:100%;display:block}
#menu{position:absolute;inset:0;z-index:10;display:flex;align-items:center;justify-content:center;background:radial-gradient(circle,#171754,#050510 75%);color:white;text-align:center;padding:22px}
.panel{width:100%;border:2px solid #00ffff;border-radius:26px;padding:22px;background:rgba(5,5,25,.94);box-shadow:0 0 30px #00ffff,inset 0 0 18px rgba(0,255,255,.25)}
h1{margin:0 0 12px;font-size:38px;color:white;text-shadow:0 0 18px #00ffff}
.sub{font-size:13px;opacity:.85;margin-bottom:14px;color:white}
button{width:100%;margin:8px 0;padding:15px;border-radius:16px;border:2px solid #ff00ff;color:white;background:#080822;font-size:19px;font-weight:bold;box-shadow:0 0 14px #ff00ff}
button.small{font-size:15px;padding:11px}
button:active{transform:scale(.98)}
</style>
</head>
<body>
<div id="phone">
  <div id="menu">
    <div class="panel">
      <div id="screenPlayers">
        <h1>NEON PONG</h1>
        <div class="sub">Choose how you want to play.</div>
        <button onclick="choosePlayers('bot')">Single Player</button>
        <button onclick="choosePlayers('pvp')">Multiplayer</button>
      </div>
      <div id="screenDifficulty" style="display:none">
        <h1>DIFFICULTY</h1>
        <div class="sub">Choose bot difficulty.</div>
        <button onclick="chooseDifficulty('easy')">Easy</button>
        <button onclick="chooseDifficulty('medium')">Medium</button>
        <button onclick="chooseDifficulty('hard')">Hard</button>
        <button class="small" onclick="showScreen('players')">Back</button>
      </div>
      <div id="screenMode" style="display:none">
        <h1>GAME MODE</h1>
        <div class="sub">Choose classic Pong or power-ups.</div>
        <button onclick="startGame('original')">Original</button>
        <button onclick="startGame('special')">Special Powers</button>
        <button class="small" onclick="backFromMode()">Back</button>
      </div>
    </div>
  </div>
  <canvas id="game"></canvas>
</div>

<script>
"use strict";
const canvas=document.getElementById("game");
const ctx=canvas.getContext("2d");
const menu=document.getElementById("menu");

let W=1,H=1;
let players="bot",difficulty="medium",gameMode="original";
let playing=false,over=false;
let topP,bottomP,balls=[];
let topScore=0,bottomScore=0,hitCount=0;
let particles=[],trails=[],powerUps=[];
let bgOffset=0,flash=0,lastColour=0,colourIndex=0,lastPower=0;
let bestCombo=Number(localStorage.getItem("neonPongBestCombo")||0),combo=0;
let comboSaveTimer=0;
let lastFrameTime=0;

// ---- AI "smarter" state ----
let aiLastThink=0,aiTargetX=0;

const colours=["#00ffff","#ff00ff","#ffff00","#00ff77","#ff6600","#8a5cff"];
const MAX_SPEED=22; // speed cap - prevents runaway velocity/NaN freeze
let audioCtx=null,master=null,musicGain=null,soundOK=false;

function showScreen(s){
  document.getElementById("screenPlayers").style.display=s==="players"?"block":"none";
  document.getElementById("screenDifficulty").style.display=s==="difficulty"?"block":"none";
  document.getElementById("screenMode").style.display=s==="mode"?"block":"none";
}
function choosePlayers(p){ unlockAudio(); sClick(); players=p; if(p==="bot") showScreen("difficulty"); else showScreen("mode"); }
function chooseDifficulty(d){ unlockAudio(); sClick(); difficulty=d; showScreen("mode"); }
function backFromMode(){ sClick(); if(players==="bot") showScreen("difficulty"); else showScreen("players"); }

function unlockAudio(){
  try{
    if(!audioCtx){
      audioCtx=new (window.AudioContext||window.webkitAudioContext)();
      master=audioCtx.createGain();
      master.gain.value=0.65;
      master.connect(audioCtx.destination);
      musicGain=audioCtx.createGain();
      musicGain.gain.value=0.16;
      musicGain.connect(audioCtx.destination);
    }
    if(audioCtx.state==="suspended") audioCtx.resume();
    soundOK=true;
    tinyBeep();
  }catch(e){soundOK=false;}
}
function tinyBeep(){
  if(!audioCtx||!master)return;
  try{
    const o=audioCtx.createOscillator(),g=audioCtx.createGain();
    o.frequency.value=22;g.gain.value=0.00001;o.connect(g);g.connect(master);
    o.start();o.stop(audioCtx.currentTime+0.01);
  }catch(e){}
}
document.addEventListener("touchstart",unlockAudio,{passive:true});
document.addEventListener("pointerdown",unlockAudio,{passive:true});
document.addEventListener("visibilitychange",()=>{if(!document.hidden)unlockAudio();else stopMusic();});

// tone() supports stereo panning (pan: -1 left .. 1 right) for positional audio
function tone(f,d=0.05,type="sine",vol=0.12,delay=0,pan=0){
  unlockAudio();
  if(!audioCtx||!master)return;
  try{
    const now=audioCtx.currentTime+delay;
    const o=audioCtx.createOscillator(),g=audioCtx.createGain();
    o.type=type;o.frequency.setValueAtTime(f,now);
    g.gain.setValueAtTime(0.0001,now);
    g.gain.exponentialRampToValueAtTime(Math.max(vol,0.0002),now+Math.min(0.012,d/3));
    g.gain.exponentialRampToValueAtTime(0.0001,now+d);
    o.connect(g);
    if(audioCtx.createStereoPanner){
      const p=audioCtx.createStereoPanner();
      p.pan.value=Math.max(-1,Math.min(1,pan||0));
      g.connect(p);p.connect(master);
    }else{
      g.connect(master);
    }
    o.start(now);o.stop(now+d+0.02);
  }catch(e){}
}
function sHit(pan=0,pitchBoost=0){
  tone(340+pitchBoost,.045,"square",.13,0,pan);
  tone(720+pitchBoost*1.4,.05,"triangle",.09,.03,pan);
}
function sWall(pan=0){tone(900,.035,"triangle",.09,0,pan);tone(1400,.02,"sine",.05,.01,pan);}
function sScore(bottomGets){
  const pan=bottomGets?-.3:.3;
  tone(220,.11,"sawtooth",.13,0,pan);tone(150,.14,"sawtooth",.09,.08,pan);tone(110,.18,"square",.07,.16,pan);
}
function sWin(){tone(520,.12,"sine",.11);tone(700,.12,"sine",.11,.12);tone(940,.16,"sine",.12,.24);tone(1180,.22,"sine",.12,.36);}
function sStart(){tone(392,.08,"sine",.1);tone(523,.08,"sine",.1,.08);tone(659,.1,"sine",.11,.16);tone(784,.16,"triangle",.12,.24);}
function sPower(){tone(1100,.06,"sine",.11);tone(1450,.07,"triangle",.09,.06);tone(1800,.05,"sine",.06,.11);}
function sPowerSpawn(){tone(600,.05,"sine",.05);tone(900,.06,"sine",.05,.05);}
function sClick(){tone(700,.035,"square",.08);}
function sCombo(n){
  const base=440+Math.min(n,40)*6;
  tone(base,.06,"triangle",.09);
  tone(base*1.26,.06,"triangle",.09,.05);
  tone(base*1.5,.09,"sine",.1,.1);
}
function sShield(){tone(200,.05,"square",.12);tone(160,.09,"square",.1,.05);}
function sShieldBreak(){tone(500,.05,"sawtooth",.12);tone(300,.1,"sawtooth",.1,.05);tone(150,.15,"sawtooth",.09,.1);}
function sSpeedBoost(){tone(700,.04,"sawtooth",.1);tone(1000,.05,"sawtooth",.1,.04);tone(1300,.06,"sawtooth",.1,.08);}
function sCurve(){tone(500,.08,"sine",.09);tone(650,.08,"sine",.08,.05);tone(450,.1,"sine",.07,.12);}
function sMystery(){tone(300,.05,"square",.09);tone(600,.05,"square",.09,.04);tone(900,.05,"square",.09,.08);tone(1200,.08,"square",.09,.12);}

// ---- procedural background soundtrack (look-ahead scheduler so timing stays tight) ----
let musicPlaying=false,musicTimer=null,nextNoteTime=0,musicStep=0;
const bassNotes=[110,110,146.83,130.81];
const arpNotes=[220,261.63,329.63,392,329.63,261.63];
const stepDur=0.27;
function playMusicNote(freq,time,dur,type,vol){
  if(!audioCtx||!musicGain)return;
  try{
    const o=audioCtx.createOscillator(),g=audioCtx.createGain();
    o.type=type;o.frequency.value=freq;
    g.gain.setValueAtTime(0.0001,time);
    g.gain.exponentialRampToValueAtTime(vol,time+0.02);
    g.gain.exponentialRampToValueAtTime(0.0001,time+dur);
    o.connect(g);g.connect(musicGain);
    o.start(time);o.stop(time+dur+0.02);
  }catch(e){}
}
function scheduleMusic(){
  if(!audioCtx)return;
  while(nextNoteTime<audioCtx.currentTime+0.15){
    const bass=bassNotes[musicStep%bassNotes.length];
    playMusicNote(bass,nextNoteTime,stepDur*0.9,"triangle",0.11);
    if(musicStep%2===0){
      const arp=arpNotes[(musicStep/2|0)%arpNotes.length];
      playMusicNote(arp,nextNoteTime+stepDur*0.5,stepDur*0.4,"sine",0.05);
    }
    nextNoteTime+=stepDur;
    musicStep++;
  }
}
function startMusic(){
  unlockAudio();
  if(musicPlaying||!audioCtx)return;
  musicPlaying=true;nextNoteTime=audioCtx.currentTime+0.05;musicStep=0;
  scheduleMusic();
  musicTimer=setInterval(scheduleMusic,100);
}
function stopMusic(){
  musicPlaying=false;
  if(musicTimer){clearInterval(musicTimer);musicTimer=null;}
}

function resize(){
  const r=canvas.getBoundingClientRect();
  canvas.width=Math.floor(r.width*devicePixelRatio);
  canvas.height=Math.floor(r.height*devicePixelRatio);
  ctx.setTransform(devicePixelRatio,0,0,devicePixelRatio,0,0);
  W=r.width;H=r.height;
  const pw=Math.min(W*.46,175),ph=17;
  topP={x:W/2-pw/2,y:90,w:pw,baseW:pw,h:ph,desiredX:W/2-pw/2,c:colours[0],t:colours[0],grow:0,shield:false,speedUntil:0,shrinkUntil:0,prevX:W/2-pw/2,moveVel:0};
  bottomP={x:W/2-pw/2,y:H-107,w:pw,baseW:pw,h:ph,desiredX:W/2-pw/2,c:colours[2],t:colours[2],grow:0,shield:false,speedUntil:0,shrinkUntil:0,prevX:W/2-pw/2,moveVel:0};
  resetBalls(Math.random()>.5?1:-1);
}
window.addEventListener("resize",resize);

function startGame(m){
  unlockAudio();
  gameMode=m; playing=true; over=false;
  topScore=0;bottomScore=0;hitCount=0;combo=0;
  particles=[];trails=[];powerUps=[];flash=0;lastPower=0;
  topP.shield=false;bottomP.shield=false;topP.speedUntil=0;bottomP.speedUntil=0;topP.shrinkUntil=0;bottomP.shrinkUntil=0;topP.grow=0;bottomP.grow=0;topP.w=topP.baseW;bottomP.w=bottomP.baseW;
  menu.style.display="none";
  resetBalls(Math.random()>.5?1:-1);
  sStart();
  startMusic();
}
function resetBalls(dir){
  balls=[{x:W/2,y:H/2,r:10,baseR:10,vx:Math.random()*5-2.5,vy:dir*6,curveUntil:0,curveSpin:0,invisibleUntil:0,hugeUntil:0}];
}
function aiSpeed(){return difficulty==="easy"?.03:difficulty==="hard"?.105:.065;}
function aiThinkInterval(){return difficulty==="easy"?230:difficulty==="hard"?60:130;}
function aiError(){return difficulty==="easy"?46:difficulty==="hard"?8:22;}
function clamp(){
  const m=18;
  for(const p of [topP,bottomP]){
    p.desiredX=Math.max(m,Math.min(W-p.w-m,p.desiredX));
    p.x=Math.max(m,Math.min(W-p.w-m,p.x));
  }
}
function collide(b,p){return b.x+b.r>p.x&&b.x-b.r<p.x+p.w&&b.y+b.r>p.y&&b.y-b.r<p.y+p.h;}
function rgb(h){h=h.replace("#","");return{r:parseInt(h.slice(0,2),16),g:parseInt(h.slice(2,4),16),b:parseInt(h.slice(4,6),16)}}
function mix(a,b,t){const A=rgb(a),B=rgb(b);return`rgb(${Math.round(A.r+(B.r-A.r)*t)},${Math.round(A.g+(B.g-A.g)*t)},${Math.round(A.b+(B.b-A.b)*t)})`}
function spawn(x,y,c,n){
  n=Math.min(n,40);
  for(let i=0;i<n;i++){
    const a=Math.random()*Math.PI*2,s=1.4+Math.random()*4.5;
    particles.push({x,y,vx:Math.cos(a)*s,vy:Math.sin(a)*s,life:1,c});
  }
  if(particles.length>120)particles.splice(0,particles.length-120);
}
// reflect a virtual (unbounded) x coordinate back into [min,max], simulating wall bounces,
// used by the AI to predict where the ball will actually end up
function reflectX(x,min,max){
  const range=max-min;
  if(range<=0)return(min+max)/2;
  let m=(x-min)%(2*range);
  if(m<0)m+=2*range;
  return m<=range?min+m:max-(m-range);
}
function addPower(t){
  if(gameMode!=="special"||powerUps.length>1)return;
  const kinds=["big","slow","multi","shield","speed","curve","mystery"];
  powerUps.push({x:45+Math.random()*(W-90),y:H*.25+Math.random()*H*.5,r:14,kind:kinds[Math.floor(Math.random()*kinds.length)],life:700});
  sPowerSpawn();
}
function activatePower(k,byBottom,ball,t){
  sPower();flash=.25;spawn(W/2,H/2,"#ffff00",40);
  const mine=byBottom?bottomP:topP, enemy=byBottom?topP:bottomP;
  if(k==="big"){mine.grow=520;mine.w=Math.min(W*.72,mine.baseW*1.45);}
  if(k==="slow"){for(const b of balls){b.vx*=0.72;b.vy*=0.72;}}
  if(k==="multi"&&balls.length<3){
    // one extra ball, travelling the OPPOSITE vertical direction to the ball that hit the power-up
    balls.push({x:ball.x,y:ball.y,r:9,baseR:9,vx:-ball.vx*0.8,vy:-ball.vy,curveUntil:0,curveSpin:0,invisibleUntil:0,hugeUntil:0});
  }
  if(k==="shield"){mine.shield=true;sShield();}
  if(k==="speed"){mine.speedUntil=t+5000;sSpeedBoost();}
  if(k==="curve"){
    sCurve();
    for(const b of balls){b.curveUntil=t+5000;b.curveSpin=(Math.random()>.5?1:-1)*(0.06+Math.random()*0.06);}
  }
  if(k==="mystery"){
    sMystery();
    const effects=["shrinkEnemy","invisBall","hugeBall"];
    const pick=effects[Math.floor(Math.random()*effects.length)];
    if(pick==="shrinkEnemy"){enemy.shrinkUntil=t+4500;enemy.w=Math.max(enemy.baseW*0.55,40);}
    if(pick==="invisBall"){for(const b of balls)b.invisibleUntil=t+3500;}
    if(pick==="hugeBall"){for(const b of balls)b.hugeUntil=t+4500;}
  }
}
function clampBallSpeed(b){
  const spd=Math.hypot(b.vx,b.vy);
  if(spd>MAX_SPEED){
    const s=MAX_SPEED/spd;
    b.vx*=s;b.vy*=s;
  }
}
function hitBall(b,p,isBottom,t){
  hitCount++;combo++;bestCombo=Math.max(bestCombo,combo);
  const now=performance.now();
  if(combo>=bestCombo && now-comboSaveTimer>150){
    localStorage.setItem("neonPongBestCombo",bestCombo);
    comboSaveTimer=now;
  }
  const speedMul=hitCount%4===0?1.055:1.025;
  b.vy=(isBottom?-Math.abs(b.vy):Math.abs(b.vy))*speedMul;
  // spin physics: contact-point offset PLUS the paddle's own motion at contact (a moving
  // paddle imparts extra sideways spin, like a real paddle brushing the ball)
  b.vx+=(b.x-(p.x+p.w/2))*.047;
  b.vx+=p.moveVel*0.55;
  clampBallSpeed(b);
  // push the ball fully outside the paddle so it can't re-trigger a hit on the very next
  // frame (this repeated re-triggering + exponential speed growth was the freeze cause)
  b.y=isBottom?p.y-b.r-1:p.y+p.h+b.r+1;
  const pan=(b.x/W)*2-1;
  sHit(pan, Math.min(combo,20)*4);
  if(combo>0&&combo%5===0)sCombo(combo);
  spawn(b.x,isBottom?p.y:p.y+p.h,p.t,28);
}
function score(bottomGets){
  if(bottomGets)bottomScore++; else topScore++;
  combo=0;flash=.38;sScore(bottomGets);spawn(W/2,bottomGets?H*.2:H*.8,bottomGets?"#ff00ff":"#00ffff",40);
  resetBalls(bottomGets?1:-1);
  if(topScore>=10||bottomScore>=10){over=true;sWin();stopMusic();spawn(W/2,H/2,"#ffffff",50);}
}
function update(t){
  // ---- delta-time scaling so physics run at the same real-world speed regardless of the
  // device's actual refresh rate (60Hz / 90Hz / 120Hz) - this is what makes movement feel
  // smooth and consistent instead of speeding up on high refresh-rate phones ----
  if(!lastFrameTime)lastFrameTime=t;
  let dt=t-lastFrameTime;lastFrameTime=t;
  if(!isFinite(dt)||dt<=0)dt=16.6667;
  const scale=Math.max(0.2,Math.min(3,dt/16.6667));

  bgOffset+=0.6*scale;
  if(t-lastColour>1250){
    colourIndex=(colourIndex+1)%colours.length;lastColour=t;
    topP.c=topP.t;topP.t=colours[colourIndex];
    bottomP.c=bottomP.t;bottomP.t=colours[(colourIndex+2)%colours.length];
  }
  for(const p of particles){p.x+=p.vx*scale;p.y+=p.vy*scale;p.vy+=.02*scale;p.life-=.026*scale;}
  particles=particles.filter(p=>p.life>0);
  powerUps=powerUps.filter(p=>p.life-- >0);
  if(flash>0)flash-=.035*scale;
  for(const p of [topP,bottomP]){
    if(p.grow>0){p.grow-=scale;if(p.grow<=0){p.grow=0;p.w=p.baseW;}}
    if(p.shrinkUntil&&t>p.shrinkUntil){p.shrinkUntil=0;p.w=p.baseW;}
    if(p.speedUntil&&t>p.speedUntil)p.speedUntil=0;
    const oldX=p.x;
    const lerp=Math.min(1,(p.speedUntil>t?0.6:0.30)*scale);
    p.x+=(p.desiredX-p.x)*lerp;
    p.moveVel=p.x-oldX;
  }
  if(!playing||over)return;
  if(gameMode==="special"&&t-lastPower>5200){lastPower=t;addPower(t);}
  for(const tr of trails)tr.life-=.045*scale;
  trails=trails.filter(tr=>tr.life>0);

  // ---- smarter AI: predicts where the ball will be when it arrives, accounting for wall
  // bounces, with a human-like "thinking" delay + slight aim error based on difficulty ----
  if(players==="bot"){
    if(t-aiLastThink>aiThinkInterval()){
      aiLastThink=t;
      const b=balls[0];
      if(b&&b.vy<0){
        const tY=(topP.y+topP.h-b.y)/b.vy;
        const virtualX=b.x+b.vx*Math.max(0,tY);
        const predicted=reflectX(virtualX,b.r+18,W-b.r-18);
        aiTargetX=predicted-topP.w/2+(Math.random()*2-1)*aiError();
      }else{
        aiTargetX=W/2-topP.w/2;
      }
    }
    topP.desiredX+=(aiTargetX-topP.desiredX)*Math.min(1,aiSpeed()*scale*2.2);
  }

  for(const b of balls){
    // NaN/Infinity guard - if physics ever produces a non-finite value, recover instead of
    // letting it silently corrupt every frame after (this is what looked like a "freeze")
    if(!isFinite(b.x)||!isFinite(b.y)||!isFinite(b.vx)||!isFinite(b.vy)){
      b.x=W/2;b.y=H/2;b.vx=Math.random()*5-2.5;b.vy=(Math.random()>.5?1:-1)*6;
    }
    if(b.curveUntil&&t>b.curveUntil){b.curveUntil=0;b.curveSpin=0;}
    if(b.curveSpin)b.vx+=b.curveSpin*scale;
    if(b.hugeUntil&&t>b.hugeUntil){b.hugeUntil=0;}
    b.r=b.hugeUntil>t?b.baseR*1.8:b.baseR;

    trails.push({x:b.x,y:b.y,r:b.r,life:1});
    if(trails.length>200)trails.splice(0,trails.length-200);
    b.x+=b.vx*scale;b.y+=b.vy*scale;
    clampBallSpeed(b);
    const pan=(b.x/W)*2-1;
    if(b.x<b.r+18){b.x=b.r+18;b.vx=Math.abs(b.vx);sWall(pan);spawn(b.x,b.y,"#00ffff",8);}
    else if(b.x>W-b.r-18){b.x=W-b.r-18;b.vx=-Math.abs(b.vx);sWall(pan);spawn(b.x,b.y,"#00ffff",8);}
    if(collide(b,bottomP)&&b.vy>0)hitBall(b,bottomP,true,t);
    if(collide(b,topP)&&b.vy<0)hitBall(b,topP,false,t);
    for(let i=powerUps.length-1;i>=0;i--){
      const p=powerUps[i],dx=b.x-p.x,dy=b.y-p.y;
      if(Math.sqrt(dx*dx+dy*dy)<b.r+p.r){activatePower(p.kind,b.vy<0,b,t);powerUps.splice(i,1);}
    }
  }
  balls=balls.filter(b=>b.y>-45&&b.y<H+45);
  if(balls.length===0)resetBalls(Math.random()>.5?1:-1);
  for(const b of balls){
    if(b.y<-28){
      if(topP.shield){topP.shield=false;b.y=-27;b.vy=Math.abs(b.vy);sShieldBreak();spawn(b.x,4,"#00ffff",30);}
      else{score(true);break;}
    }
    if(b.y>H+28){
      if(bottomP.shield){bottomP.shield=false;b.y=H+27;b.vy=-Math.abs(b.vy);sShieldBreak();spawn(b.x,H-4,"#ff00ff",30);}
      else{score(false);break;}
    }
  }
  clamp();
}
function drawBg(){
  ctx.fillStyle="#050510";ctx.fillRect(0,0,W,H);
  const m=14,g=ctx.createLinearGradient(0,0,0,H);g.addColorStop(0,"#ff00ff");g.addColorStop(.45,"#8a5cff");g.addColorStop(1,"#00ffff");
  ctx.strokeStyle=g;ctx.lineWidth=5;ctx.shadowBlur=18;ctx.shadowColor="#00ffff";ctx.strokeRect(m,m,W-m*2,H-m*2);ctx.shadowBlur=0;
  for(let y=(bgOffset%42)-42;y<H;y+=42){ctx.strokeStyle="rgba(255,0,255,.06)";ctx.beginPath();ctx.moveTo(m,y);ctx.lineTo(W-m,y);ctx.stroke();}
  for(let x=m;x<W-m;x+=42){ctx.strokeStyle="rgba(0,255,255,.045)";ctx.beginPath();ctx.moveTo(x,m);ctx.lineTo(x,H-m);ctx.stroke();}
  ctx.strokeStyle="rgba(255,255,255,.5)";ctx.setLineDash([13,12]);ctx.beginPath();ctx.moveTo(m,H/2);ctx.lineTo(W-m,H/2);ctx.stroke();ctx.setLineDash([]);
}
function drawPaddle(p){
  const pr=Math.min(1,(performance.now()-lastColour)/1250),c=mix(p.c,p.t,pr);
  if(p.shield){
    ctx.shadowBlur=22;ctx.shadowColor="#00ffff";ctx.strokeStyle="rgba(0,255,255,.85)";ctx.lineWidth=3;
    ctx.strokeRect(p.x-6,p.y-6,p.w+12,p.h+12);ctx.shadowBlur=0;
  }
  if(p.speedUntil>performance.now()){
    ctx.shadowBlur=18;ctx.shadowColor="#ffaa00";ctx.strokeStyle="rgba(255,170,0,.8)";ctx.lineWidth=2;
    ctx.strokeRect(p.x-3,p.y-3,p.w+6,p.h+6);ctx.shadowBlur=0;
  }
  ctx.shadowBlur=28;ctx.shadowColor=c;ctx.fillStyle=c;ctx.fillRect(p.x,p.y,p.w,p.h);
  ctx.fillStyle="rgba(255,255,255,.62)";ctx.fillRect(p.x+8,p.y+3,p.w-16,3);ctx.shadowBlur=0;
}
function draw(){
  drawBg();
  for(const tr of trails){const trLife=Math.max(0,tr.life);ctx.globalAlpha=trLife*.55;ctx.shadowBlur=24;ctx.shadowColor="#00aaff";ctx.fillStyle="#00aaff";ctx.beginPath();ctx.arc(tr.x,tr.y,Math.max(0,tr.r*(.3+trLife*.85)),0,Math.PI*2);ctx.fill();}
  ctx.globalAlpha=1;ctx.shadowBlur=0;
  for(const p of particles){ctx.globalAlpha=Math.max(0,p.life);ctx.shadowBlur=14;ctx.shadowColor=p.c;ctx.fillStyle=p.c;ctx.beginPath();ctx.arc(p.x,p.y,Math.max(0,3.6*p.life),0,Math.PI*2);ctx.fill();}
  ctx.globalAlpha=1;ctx.shadowBlur=0;
  const powerLabels={big:"BIG",slow:"SLOW",multi:"MULTI",shield:"SHIELD",speed:"SPEED",curve:"CURVE",mystery:"???"};
  for(const p of powerUps){ctx.shadowBlur=22;ctx.shadowColor="#ffff00";ctx.fillStyle="#ffff00";ctx.beginPath();ctx.arc(p.x,p.y,p.r,0,Math.PI*2);ctx.fill();ctx.shadowBlur=0;ctx.fillStyle="#050510";ctx.font="bold 7px Arial";ctx.textAlign="center";ctx.fillText(powerLabels[p.kind]||"?",p.x,p.y+3);}
  drawPaddle(topP);drawPaddle(bottomP);
  const now=performance.now();
  for(const b of balls){
    const invisible=b.invisibleUntil>now;
    ctx.globalAlpha=invisible?0.18:1;
    ctx.shadowBlur=30;ctx.shadowColor="#fff";ctx.fillStyle="#fff";ctx.beginPath();ctx.arc(b.x,b.y,Math.max(0,b.r),0,Math.PI*2);ctx.fill();
    ctx.globalAlpha=1;
  }
  ctx.shadowBlur=0;
  ctx.textAlign="center";ctx.font="bold 42px Arial";ctx.shadowBlur=18;ctx.fillStyle="#fff";ctx.shadowColor="#fff";ctx.fillText(topScore+" : "+bottomScore,W/2,62);ctx.shadowBlur=0;
  if(gameMode==="special"){ctx.font="bold 13px Arial";ctx.fillStyle="rgba(255,255,255,.85)";ctx.fillText("COMBO "+combo+"   BEST "+bestCombo,W/2,H-38);}
  if(flash>0){ctx.globalAlpha=flash;ctx.fillStyle="#fff";ctx.fillRect(0,0,W,H);ctx.globalAlpha=1;}
  if(over){ctx.fillStyle="rgba(0,0,0,.76)";ctx.fillRect(0,0,W,H);ctx.fillStyle="#fff";ctx.font="bold 32px Arial";ctx.shadowBlur=22;ctx.shadowColor="#00ffff";ctx.fillText(bottomScore>topScore?"PLAYER 1 WINS!":(players==="pvp"?"PLAYER 2 WINS!":"BOT WINS!"),W/2,H/2-12);ctx.font="20px Arial";ctx.fillText("Tap to return to menu",W/2,H/2+36);ctx.shadowBlur=0;}
}
const _origArc=ctx.arc.bind(ctx);
ctx.arc=function(x,y,r,a0,a1,ccw){return _origArc(x,y,Math.max(0,r),a0,a1,ccw);};
function loop(t){try{update(t);draw();}catch(e){console.log(e);playing=false;over=false;stopMusic();menu.style.display="flex";}requestAnimationFrame(loop);}
canvas.addEventListener("touchmove",e=>{
  e.preventDefault();unlockAudio();
  const r=canvas.getBoundingClientRect();
  for(const touch of e.touches){
    const x=touch.clientX-r.left,y=touch.clientY-r.top;
    if(y>H/2)bottomP.desiredX=x-bottomP.w/2;
    else if(players==="pvp")topP.desiredX=x-topP.w/2;
  }
  clamp();
},{passive:false});
canvas.addEventListener("click",()=>{unlockAudio();if(over){sClick();playing=false;over=false;showScreen("players");menu.style.display="flex";}});
resize();loop(0);
</script>
</body>
</html>
